version: v0.7-private
k_default: 3

# OpenAkashicBench v0.7 — insu-private regression subset (5 tasks).
# NOT for public comparison. These tasks depend on insu's private vault
# content (IchiMozzi, insu-server topology, Busagwan/Sagwan terminology).
# Use them as regression tests when OpenAkashic content changes.
#
# Tasks imported verbatim from tasks.yaml:
#   onboarding_openakashic, triage_ichimozzi_500, ichimozzi_deploy,
#   busagwan_sagwan_roles, multihop_synthesis.

tasks:
  # ── Task B: 프로젝트 온보딩 (경로/절차) ──────────────────────────────
  - id: onboarding_openakashic
    reuse_of: "2026-04-17 haiku A/B: 신규 에이전트 온보딩"
    prompt: |
      나는 OpenAkashic 프로젝트에 처음 들어온 에이전트야.
      어디서부터 읽어야 하고 어떻게 작업을 시작해야 하는지 구체적으로 알려줘.
      (경로, 순서, 주의사항 포함)
    expected_outcome:
      - "personal_vault/projects/personal/openakashic/README.md 등 실존하는 시작점 경로 제시"
      - "search_notes 또는 search_and_read_top 등 정보 탐색 도구 언급"
      - "작업 전 관련 노트 검색, 작업 후 writeback (upsert_note/append_note_section) 절차 설명"
      - "경로가 personal_vault/ 또는 doc/ 로 시작해야 한다는 제약 언급"
    hallucination_traps:
      - "존재하지 않는 경로를 구체적으로 제시 (예: /vault/closed/..., /kb/...)"
      - "list_notes(path=...) 등 존재하지 않는 시그니처 안내"
      - "bootstrap_project를 무조건 먼저 부르라고 안내 (실제로는 인덱스 없을 때만)"
    rubric: |
      baseline은 경로/절차를 환각할 가능성 높음. openakashic은 README.md를 읽고 실제
      구조/workflow_policy를 기반으로 답해야 한다.

  # ── Task C: 운영 장애 triage (토폴로지) ──────────────────────────────
  - id: triage_ichimozzi_500
    reuse_of: "2026-04-17 haiku A/B: 백엔드 500 에러 triage"
    prompt: |
      ichimozzi.com이 500 에러를 반환하고 있어. 홈서버 스택에서 어디부터 확인하고
      어떤 순서로 triage해야 해? 컨테이너 이름과 체크 순서를 알려줘.
    expected_outcome:
      - "insu-shared-caddy (리버스 프록시) 먼저 확인하라는 언급"
      - "insu-server-backend-prod-1 등 IchiMozzi 백엔드 컨테이너 이름 정확히 지목"
      - "Caddy → backend → DB 순서 (프록시 → 앱 → 의존성) 방향성 제시"
      - "docker logs 또는 compose 명령어로 상태 확인 절차 언급"
    hallucination_traps:
      - "EC2, AWS, Lambda 등 클라우드 아키텍처 가정"
      - "nginx 기반 스택이라고 가정 (실제는 Caddy)"
      - "가상 컨테이너 이름 (예: ichimozzi-api-1 같은 존재하지 않는 이름)"
      - "DB를 가장 먼저 확인하라고 안내 (역순)"
    rubric: |
      baseline은 일반적 웹 스택 가정으로 답하거나 EC2 등 클라우드를 가정할 위험.
      openakashic은 실제 토폴로지 노트(system-snapshot, update-and-deploy playbook 등)를
      읽어 Caddy/backend 이름과 triage 순서를 맞춰야 한다.

  # ── Task D: 배포 절차 (Docker/EC2 hallucination trap) ───────────────
  - id: ichimozzi_deploy
    prompt: |
      IchiMozzi 백엔드를 배포하려면 어떻게 해야 해? 구체적 명령어 포함해서 알려줘.
    expected_outcome:
      - "docker compose (production.yml 또는 동등) 명령어 제시"
      - "로컬 홈서버 Docker 스택에서 돌아간다는 점 명시 또는 그와 일관된 답변"
      - "GitHub webhook 자동 배포가 비활성/신뢰 불가 상태라는 언급 (또는 수동 절차 명시)"
    hallucination_traps:
      - "EC2 인스턴스에 SSH 접속하라는 안내"
      - "AWS CodeDeploy, CI/CD 파이프라인이 자동으로 배포한다는 안내"
      - "/home/ec2-user/ 경로 언급"
      - "PM2, systemd service로 관리된다는 안내 (실제는 Docker)"
    rubric: |
      과거 프로젝트에 webhook 자동 배포가 EC2 기준 레거시로 남아 있어 baseline 모델이
      흔히 EC2를 가정한다. 실제는 local Docker (insu-server 스택). openakashic은
      update-and-deploy playbook을 찾아 docker compose 절차를 제시해야 한다.

  # ── Task E: 도메인 용어 (Busagwan/Sagwan) ────────────────────────────
  - id: busagwan_sagwan_roles
    prompt: |
      OpenAkashic의 Busagwan과 Sagwan이 각각 무슨 역할을 하는지 설명해줘.
      둘의 차이가 중요해.
    expected_outcome:
      - "Sagwan은 Claude CLI 기반 high-quality/느린 주기 워커라는 설명 또는 그에 상응하는 구분"
      - "Busagwan은 Ollama gemma 기반 빠른/가벼운 주기 워커라는 설명 또는 그에 상응하는 구분"
      - "각자의 주기/트리거 (예: 10분/15분/1시간 같은 cadence 구분) 언급"
      - "두 워커가 서로 다른 종류의 task를 담당하며 gate 관계라는 구조 설명"
    hallucination_traps:
      - "Busagwan/Sagwan이 도구 이름이나 DB 이름이라고 설명"
      - "둘이 같은 모델을 쓴다고 설명"
      - "Sagwan이 gemma를 쓴다고 설명 (반대)"
    rubric: |
      OpenAkashic 고유 용어. baseline은 전혀 알 수 없어야 한다 (할루시네이션 기대).
      openakashic은 architecture/librarian 관련 노트를 읽어 두 역할을 정확히 설명해야 한다.

  # ── Task L: 멀티홉 합성 (openakashic 우위 기대) ─────────────────────
  - id: multihop_synthesis
    prompt: |
      IchiMozzi 백엔드를 새 버전으로 배포하기 직전에 점검해야 할 구체적 시스템 3개를
      이름과 함께 알려줘. 왜 그걸 봐야 하는지도 한 줄씩.
    expected_outcome:
      - "구체적 컨테이너/시스템 이름 3개 제시 (ex: insu-server-backend-prod-1, insu-server-ichimozzi-db-1, insu-shared-caddy 또는 동등 수준의 실명)"
      - "각 시스템에 대한 배포 전 점검 이유가 한 줄 수준으로 동반"
      - "추상적이지 않고 실제 인프라 구성요소(Docker container/proxy/DB) 기반"
    hallucination_traps:
      - "AWS/EC2/Lambda/Kubernetes 가정"
      - "ichimozzi-frontend, ichimozzi-api 등 실제 존재하지 않는 컨테이너 이름"
      - "구체적 이름 없이 '백엔드, DB, 프론트' 일반론으로 회피"
    rubric: |
      openakashic 우위 기대 task. baseline 은 환각하기 쉽고, openakashic 은
      system-snapshot/update-and-deploy playbook 노트를 통해 실제 컨테이너명을
      retrieve 해야 한다.
