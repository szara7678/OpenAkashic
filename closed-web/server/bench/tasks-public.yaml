version: v0.6-public
k_default: 3

# Public benchmark subset — environment-neutral tasks that any OpenAkashic
# instance can run without insu-specific vault content. 12 tasks total.
# For the full 17-task suite (including IchiMozzi/insu-server specific),
# see tasks.yaml.

tasks:
  - id: general_web_fact
    prompt: |
      Anthropic이 공개한 Model Context Protocol(MCP)의 공식 저장소 URL과
      그 프로토콜이 무엇을 위한 것인지 한 문단으로 설명해줘.
    expected_outcome:
      - "github.com/modelcontextprotocol 혹은 modelcontextprotocol.io 등 실제 도메인/URL 제시"
      - "MCP가 LLM 에이전트에게 외부 도구/데이터 소스를 연결하기 위한 표준 프로토콜이라는 설명"
      - "Anthropic이 설계/공개한 open standard라는 맥락 언급"
    hallucination_traps:
      - "MCP가 OpenAI의 프로토콜이라고 설명"
      - "존재하지 않는 anthropic.com/mcp/docs 같은 환각 URL"
    rubric: |
      OpenAkashic과 무관한 일반 웹 사실. baseline/standard/openakashic 모두 충분히
      답할 수 있어야 공정함을 검증. standard는 web_search로 쉽게 맞춰야 함.

  - id: memory_roundtrip
    prompt: |
      내 선호사항 3가지를 기억해둬: (1) 저녁에 커피 금지, (2) 주말에는 이메일 확인 안 함,
      (3) 운동은 아침 6시 30분에. 그리고 나서 내가 "내 선호사항 말해줘" 라고 하면
      정확히 그대로 불러와서 답하도록 해. 저장 후 즉시 회수해서 답해줘.
    expected_outcome:
      - "세 선호사항을 메모/노트에 저장하는 호출을 수행"
      - "저장한 메모를 다시 읽어와 answer에 세 항목 모두 포함"
      - "저녁 커피 금지, 주말 이메일 미확인, 아침 6시 30분 운동 세 항목을 정확히 반영"
    hallucination_traps:
      - "저장하지 않고 '저장했습니다'만 주장"
      - "세 항목 중 일부만 회수하며 나머지는 '기억 못함' 이라고 답"
    rubric: |
      기본 메모리 기능 검증. baseline은 도구가 없으므로 "저장 불가"를 정직하게
      답해야 pass (파라메트릭 즉시 회상은 인정). standard/openakashic은 실제
      notes_write→notes_read (또는 upsert→read_note) 라운드트립을 수행해야 pass.

  - id: busagwan_sagwan_roles
    prompt: |
      OpenAkashic의 Busagwan과 Sagwan이 각각 무슨 역할을 하는지 설명해줘.
      둘의 차이가 중요해.
    expected_outcome:
      - "Sagwan은 Claude CLI 기반 high-quality/느린 주기 워커라는 설명 또는 그에 상응하는 구분"
      - "Busagwan은 Ollama gemma 기반 빠른/가벼운 주기 워커라는 설명 또는 그에 상응하는 구분"
      - "각자의 주기/트리거 (예: 10분/15분/1시간 같은 cadence 구분) 언급"
      - "두 워커가 서로 다른 종류의 task를 담당하며 gate 관계라는 구조 설명"
    hallucination_traps:
      - "Busagwan/Sagwan이 도구 이름이나 DB 이름이라고 설명"
      - "둘이 같은 모델을 쓴다고 설명"
      - "Sagwan이 gemma를 쓴다고 설명 (반대)"
    rubric: |
      OpenAkashic 고유 용어. baseline은 전혀 알 수 없어야 한다 (할루시네이션 기대).
      openakashic은 architecture/librarian 관련 노트를 읽어 두 역할을 정확히 설명해야 한다.

  - id: coding_python_bug
    prompt: |
      이 Python 함수에 버그가 있어. 무엇이 문제이고 어떻게 고쳐야 해?
      ```python
      def avg(nums):
          total = 0
          for n in nums:
              total += n
          return total / len(nums)
      ```
      주된 위험 케이스 1개를 짚고, 수정된 코드 한 버전 제시.
    expected_outcome:
      - "빈 리스트(또는 길이 0) 입력 시 ZeroDivisionError 가 발생한다는 진단"
      - "수정안: len(nums) == 0 가드(또는 try/except, 또는 statistics.mean) 제시"
      - "수정된 코드 스니펫이 실제로 실행 가능한 형태로 제공"
    hallucination_traps:
      - "정수 나눗셈/Python 2/3 차이가 문제라고 주장 (실제로는 / 가 float division)"
      - "total 초기값을 1로 해야 한다고 주장"
      - "for 문 자체가 잘못되었다고 주장"
    rubric: |
      모든 조건이 풀 수 있어야 하는 기본 코딩 task. baseline/standard/openakashic 모두
      파라메트릭 지식으로 풀 수 있어야 함. standard가 도구 핑계로 회피하면 fail.

  - id: coding_sql_index
    prompt: |
      Postgres 에서 다음 쿼리가 느려:
      ```sql
      SELECT * FROM events WHERE user_id = 42 AND created_at >= NOW() - INTERVAL '7 days'
      ORDER BY created_at DESC LIMIT 50;
      ```
      어떤 인덱스를 만들면 좋고, 이유는 뭐야? CREATE INDEX 문도 같이.
    expected_outcome:
      - "복합 인덱스 권장: (user_id, created_at) 또는 (user_id, created_at DESC) — 두 컬럼 순서 정확히"
      - "user_id 가 동등 비교(equality)이고 created_at 이 범위/정렬이라 이 순서가 맞다는 설명"
      - "CREATE INDEX 또는 CREATE INDEX CONCURRENTLY 문법으로 실제 SQL 제시"
    hallucination_traps:
      - "각각 단일 인덱스 두 개를 만들라고 안내(복합보다 비효율적인데 이게 더 빠르다고 단언)"
      - "(created_at, user_id) 순서로 안내 (역순)"
      - "전체 테이블 인덱싱이 필요하다는 모호한 설명"
    rubric: |
      DB 기본 지식. baseline/standard/openakashic 모두 파라메트릭으로 풀어야 함.

  - id: daily_agenda
    prompt: |
      월요일 아침 30분짜리 팀 스탠드업 어젠다를 3가지 항목으로 짧게 정리해줘.
      각 항목에는 목적 한 줄과 시간 배분(분)도 같이.
    expected_outcome:
      - "정확히 3개의 항목(혹은 명확한 3-bullet 구조)으로 구성"
      - "각 항목에 목적/설명이 한 줄 정도로 명시"
      - "시간 배분의 합이 30분 또는 그 근처(±5분)에 수렴 (ex: 5+10+15)"
    hallucination_traps:
      - "5개 이상의 항목으로 늘려서 답"
      - "시간 배분 자체를 생략"
      - "시간 합계가 60분 이상으로 명백히 30분 스탠드업과 불일치"
    rubric: |
      도구 없어도 LLM이 충분히 만들어낼 수 있는 생성형 일상 작업. standard가 도구
      찾기로 시간 낭비하면 안 됨 — 파라메트릭으로 바로 답하는 게 정답.

  - id: daily_email_rewrite
    prompt: |
      다음 메시지를 정중한 비즈니스 이메일 한국어로 바꿔줘 (3-5문장):
      "야 그 보고서 언제 보내냐 마감 지났는데 답도 없네"
    expected_outcome:
      - "반말/욕설 톤이 사라지고 존댓말로 변환됨"
      - "보고서 제출 지연을 정중하게 묻는 표현이 포함됨"
      - "3~5문장 범위(또는 그에 준하는 짧은 단락) 안에서 정리됨"
      - "수신자에 대한 위협/책망 없이 협조 요청 형태로 마무리"
    hallucination_traps:
      - "여전히 반말 또는 명령조 표현 잔존"
      - "10문장 이상의 긴 장문 답"
      - "사과 일색으로 발신자가 자기 잘못을 비는 형태로 뒤집힘 (의도 왜곡)"
    rubric: |
      파라메트릭 글쓰기 task. 모든 조건이 도구 없이 답해야 함. standard 가 도구
      탐색으로 회피하지 않는지 검증.

  # v0.6 — review/consolidation workflow coverage
  - id: review_workflow
    prompt: |
      검색 결과로 찾은 capsule 하나에서 중요한 기술적 오류를 발견했어.
      Akashic에 어떻게 이의를 남기고 다른 에이전트들에게 경고해야 해?
      실제로 호출할 MCP 도구와 파라미터도 써줘.
    expected_outcome:
      - "review_note MCP 도구를 명시적으로 언급한다"
      - "stance='dispute' 선택을 제시한다 (support/neutral 아님)"
      - "rationale에 20자 이상의 구체적 오류 설명 포함"
      - "evidence_urls 또는 evidence_paths로 근거 추가 권장을 언급한다"
    hallucination_traps:
      - "upsert_note(kind='claim', metadata={...})로 직접 조립하라고 안내한다"
      - "dispute_note를 rich review 수단으로 잘못 안내한다 (dispute_note는 one-click signal)"
      - "존재하지 않는 도구명 (예: submit_dispute, create_challenge)을 제시한다"
    rubric: |
      baseline은 일반론으로 답할 확률 높음. openakashic은 review_note의 정확한 시그니처와
      stance semantics를 명시해야 한다.

  - id: list_reviews_first
    prompt: |
      어떤 capsule에 리뷰를 달려고 해. 중복을 피하려면 뭐부터 확인해야 해?
    expected_outcome:
      - "list_reviews 또는 list_reviews(target, include_consolidated=True) 호출을 먼저 제시한다"
      - "기존 리뷰를 확인한 뒤에 중복되지 않는 새 review_note를 작성하라는 순서 설명"
      - "consolidated 리뷰도 include하라는 옵션을 안내한다"
    hallucination_traps:
      - "search_notes로 리뷰를 찾으라고 안내 (search는 targeted claim 기본 제외)"
      - "리뷰 확인 없이 바로 review_note를 호출하라고 안내"
    rubric: |
      openakashic 조건에서는 list_reviews 선행 확인과 include_consolidated 옵션까지 언급해야 한다.

  - id: consolidation_awareness
    prompt: |
      sagwan이 내 리뷰를 '정리'했다는데 정확히 어떻게 되는 거야?
      그리고 그 이후에도 그 리뷰를 볼 수 있어?
    expected_outcome:
      - "consolidation 시 claim_review_lifecycle이 consolidated로 바뀐다는 설명"
      - "3-way 판정(uphold / revise / supersede) 언급"
      - "list_reviews(include_consolidated=True)로 여전히 조회 가능하다는 안내"
      - "aggregate(confirm/dispute/neutral count)에서는 제외된다는 설명"
    hallucination_traps:
      - "consolidated 리뷰가 삭제된다고 안내"
      - "revise와 supersede를 같은 것처럼 설명"
    rubric: |
      openakashic은 lifecycle 전환, 3-way verdict, include_consolidated 조회, aggregate 제외를 모두
      연결해서 설명해야 한다.

  - id: version_lineage
    prompt: |
      검색 결과에서 어떤 capsule을 찾았는데 supersedes 필드가 있어.
      이게 뭐고 어떻게 행동해야 해?
    expected_outcome:
      - "supersedes = 이 capsule이 대체하는 이전 버전 경로라는 설명"
      - "superseded_by = 후속 버전 경로 (반대 방향) 설명"
      - "supersedes 있는 capsule은 최신이므로 우선 참조, superseded_by 있는 capsule은 구버전이므로 새 버전으로 이동 권장"
      - "검색 랭킹에서 superseded_by 있는 note는 자동 demoted (0.35x)라는 mechanics 언급"
    hallucination_traps:
      - "두 필드를 동일 방향으로 설명"
      - "supersede를 git commit history처럼 설명 (branching)"
    rubric: |
      openakashic은 lineage 방향과 검색 demotion mechanics를 함께 설명해야 한다.

  - id: citation_integrity
    prompt: |
      Akashic에서 답을 찾아서 사용자에게 전달할 때 어떻게 인용해야 신뢰성이 확보돼?
    expected_outcome:
      - "실제 조회한 노트 path 또는 capsule id를 답변에 명시한다"
      - "search_akashic 결과의 capsule.id 또는 search_notes 결과의 note.path를 쓴다"
      - "인용 없이 결과만 복사하면 overclaim으로 간주된다는 경계 설명"
    hallucination_traps:
      - "출처 없이 사실만 답변하고 '알려진 사실'이라고 표기"
      - "존재하지 않는 path (예: /kb/foo)를 인용한다"
    rubric: |
      openakashic은 실제 조회한 capsule id / note path를 답에 남겨야 하며, 출처 없는 복사는
      overclaim이라는 점을 분명히 해야 한다.
