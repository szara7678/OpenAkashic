version: v0.5
k_default: 3

# v0.5: outcome-based A/B bench.
# 동일 task를 두 조건으로 돌린다:
#   - baseline: MCP/스킬 없이 모델 파라메트릭 지식만
#   - openakashic: MCP 도구 노출 (2-turn)
# 판정은 "도구를 올바르게 불렀는가"가 아니라 "답이 정확하고, 근거 있고, 할루시네이션 없는가".
#
# 각 task 필드:
#   prompt: 자연스러운 사용자 질문
#   expected_outcome: 정답이 포함해야 할 사실 체크포인트 (hit rate로 점수)
#   hallucination_traps: 만약 언급되면 fail. insu 환경에서 실제로 틀린 주장들.
#   rubric: 판정관에게 주는 자유 형식 가이드
#   reuse_of: 과거 실험 참조 (있으면)

tasks:
  # ── Task A: 도메인 포맷 제약 (IchiMozzi JLPT 문제 생성) ─────────────────
  - id: domain_jlpt_gen
    reuse_of: "2026-04-17 haiku A/B: IchiMozzi JLPT N4 어휘 문제 생성"
    prompt: |
      IchiMozzi 앱에 쓸 JLPT N4 어휘 fill-in 문제 1개를 만들어줘.
      4지선다, 일본어로, IchiMozzi에서 실제 쓰는 형식으로.
    expected_outcome:
      - "문제 본문이 일본어로 작성되고 ( ) 또는 _____ 형태의 빈칸을 포함한다"
      - "보기 4개가 일본어 어휘이며 N4 수준"
      - "정답 1개와 해설 또는 정답 번호가 명시된다"
      - "정답이 보기 안에 실제로 존재한다 (자기 자신이 정답이 되는 순환 오류 없음)"
    hallucination_traps:
      - "한국어 번역문을 본문으로 쓴다"
      - "동의어 선택 형식 (IchiMozzi 형식이 아님)"
      - "N1/N2 수준 어휘를 사용한다"
    rubric: |
      IchiMozzi의 실제 문제 형식은 fill-in-the-blank 4지선다. baseline은 형식을 모르거나
      한국어 혼용/동의어 선택으로 틀릴 확률 높음. openakashic은 playbook/design 노트를
      통해 형식 제약을 지켜야 한다.

  # ── Task B: 프로젝트 온보딩 (경로/절차) ──────────────────────────────
  - id: onboarding_openakashic
    reuse_of: "2026-04-17 haiku A/B: 신규 에이전트 온보딩"
    prompt: |
      나는 OpenAkashic 프로젝트에 처음 들어온 에이전트야.
      어디서부터 읽어야 하고 어떻게 작업을 시작해야 하는지 구체적으로 알려줘.
      (경로, 순서, 주의사항 포함)
    expected_outcome:
      - "personal_vault/projects/personal/openakashic/README.md 등 실존하는 시작점 경로 제시"
      - "search_notes 또는 search_and_read_top 등 정보 탐색 도구 언급"
      - "작업 전 관련 노트 검색, 작업 후 writeback (upsert_note/append_note_section) 절차 설명"
      - "경로가 personal_vault/ 또는 doc/ 로 시작해야 한다는 제약 언급"
    hallucination_traps:
      - "존재하지 않는 경로를 구체적으로 제시 (예: /vault/closed/..., /kb/...)"
      - "list_notes(path=...) 등 존재하지 않는 시그니처 안내"
      - "bootstrap_project를 무조건 먼저 부르라고 안내 (실제로는 인덱스 없을 때만)"
    rubric: |
      baseline은 경로/절차를 환각할 가능성 높음. openakashic은 README.md를 읽고 실제
      구조/workflow_policy를 기반으로 답해야 한다.

  # ── Task C: 운영 장애 triage (토폴로지) ──────────────────────────────
  - id: triage_ichimozzi_500
    reuse_of: "2026-04-17 haiku A/B: 백엔드 500 에러 triage"
    prompt: |
      ichimozzi.com이 500 에러를 반환하고 있어. 홈서버 스택에서 어디부터 확인하고
      어떤 순서로 triage해야 해? 컨테이너 이름과 체크 순서를 알려줘.
    expected_outcome:
      - "insu-shared-caddy (리버스 프록시) 먼저 확인하라는 언급"
      - "insu-server-backend-prod-1 등 IchiMozzi 백엔드 컨테이너 이름 정확히 지목"
      - "Caddy → backend → DB 순서 (프록시 → 앱 → 의존성) 방향성 제시"
      - "docker logs 또는 compose 명령어로 상태 확인 절차 언급"
    hallucination_traps:
      - "EC2, AWS, Lambda 등 클라우드 아키텍처 가정"
      - "nginx 기반 스택이라고 가정 (실제는 Caddy)"
      - "가상 컨테이너 이름 (예: ichimozzi-api-1 같은 존재하지 않는 이름)"
      - "DB를 가장 먼저 확인하라고 안내 (역순)"
    rubric: |
      baseline은 일반적 웹 스택 가정으로 답하거나 EC2 등 클라우드를 가정할 위험.
      openakashic은 실제 토폴로지 노트(system-snapshot, update-and-deploy playbook 등)를
      읽어 Caddy/backend 이름과 triage 순서를 맞춰야 한다.

  # ── Task D: 배포 절차 (Docker/EC2 hallucination trap) ───────────────
  - id: ichimozzi_deploy
    prompt: |
      IchiMozzi 백엔드를 배포하려면 어떻게 해야 해? 구체적 명령어 포함해서 알려줘.
    expected_outcome:
      - "docker compose (production.yml 또는 동등) 명령어 제시"
      - "로컬 홈서버 Docker 스택에서 돌아간다는 점 명시 또는 그와 일관된 답변"
      - "GitHub webhook 자동 배포가 비활성/신뢰 불가 상태라는 언급 (또는 수동 절차 명시)"
    hallucination_traps:
      - "EC2 인스턴스에 SSH 접속하라는 안내"
      - "AWS CodeDeploy, CI/CD 파이프라인이 자동으로 배포한다는 안내"
      - "/home/ec2-user/ 경로 언급"
      - "PM2, systemd service로 관리된다는 안내 (실제는 Docker)"
    rubric: |
      과거 프로젝트에 webhook 자동 배포가 EC2 기준 레거시로 남아 있어 baseline 모델이
      흔히 EC2를 가정한다. 실제는 local Docker (insu-server 스택). openakashic은
      update-and-deploy playbook을 찾아 docker compose 절차를 제시해야 한다.

  # ── Task F: 일반 웹 검색 능력 (OpenAkashic 무관) ───────────────────────
  - id: general_web_fact
    prompt: |
      Anthropic이 공개한 Model Context Protocol(MCP)의 공식 저장소 URL과
      그 프로토콜이 무엇을 위한 것인지 한 문단으로 설명해줘.
    expected_outcome:
      - "github.com/modelcontextprotocol 혹은 modelcontextprotocol.io 등 실제 도메인/URL 제시"
      - "MCP가 LLM 에이전트에게 외부 도구/데이터 소스를 연결하기 위한 표준 프로토콜이라는 설명"
      - "Anthropic이 설계/공개한 open standard라는 맥락 언급"
    hallucination_traps:
      - "MCP가 OpenAI의 프로토콜이라고 설명"
      - "존재하지 않는 anthropic.com/mcp/docs 같은 환각 URL"
    rubric: |
      OpenAkashic과 무관한 일반 웹 사실. baseline/standard/openakashic 모두 충분히
      답할 수 있어야 공정함을 검증. standard는 web_search로 쉽게 맞춰야 함.

  # ── Task G: 에이전트 기본 메모리 라운드트립 ──────────────────────────
  - id: memory_roundtrip
    prompt: |
      내 선호사항 3가지를 기억해둬: (1) 저녁에 커피 금지, (2) 주말에는 이메일 확인 안 함,
      (3) 운동은 아침 6시 30분에. 그리고 나서 내가 "내 선호사항 말해줘" 라고 하면
      정확히 그대로 불러와서 답하도록 해. 저장 후 즉시 회수해서 답해줘.
    expected_outcome:
      - "세 선호사항을 메모/노트에 저장하는 호출을 수행"
      - "저장한 메모를 다시 읽어와 answer에 세 항목 모두 포함"
      - "저녁 커피 금지, 주말 이메일 미확인, 아침 6시 30분 운동 세 항목을 정확히 반영"
    hallucination_traps:
      - "저장하지 않고 '저장했습니다'만 주장"
      - "세 항목 중 일부만 회수하며 나머지는 '기억 못함' 이라고 답"
    rubric: |
      기본 메모리 기능 검증. baseline은 도구가 없으므로 "저장 불가"를 정직하게
      답해야 pass (파라메트릭 즉시 회상은 인정). standard/openakashic은 실제
      notes_write→notes_read (또는 upsert→read_note) 라운드트립을 수행해야 pass.

  # ── Task E: 도메인 용어 (Busagwan/Sagwan) ────────────────────────────
  - id: busagwan_sagwan_roles
    prompt: |
      OpenAkashic의 Busagwan과 Sagwan이 각각 무슨 역할을 하는지 설명해줘.
      둘의 차이가 중요해.
    expected_outcome:
      - "Sagwan은 Claude CLI 기반 high-quality/느린 주기 워커라는 설명 또는 그에 상응하는 구분"
      - "Busagwan은 Ollama gemma 기반 빠른/가벼운 주기 워커라는 설명 또는 그에 상응하는 구분"
      - "각자의 주기/트리거 (예: 10분/15분/1시간 같은 cadence 구분) 언급"
      - "두 워커가 서로 다른 종류의 task를 담당하며 gate 관계라는 구조 설명"
    hallucination_traps:
      - "Busagwan/Sagwan이 도구 이름이나 DB 이름이라고 설명"
      - "둘이 같은 모델을 쓴다고 설명"
      - "Sagwan이 gemma를 쓴다고 설명 (반대)"
    rubric: |
      OpenAkashic 고유 용어. baseline은 전혀 알 수 없어야 한다 (할루시네이션 기대).
      openakashic은 architecture/librarian 관련 노트를 읽어 두 역할을 정확히 설명해야 한다.

  # ── Task H: 코딩 — Python 버그 찾기 ─────────────────────────────────
  - id: coding_python_bug
    prompt: |
      이 Python 함수에 버그가 있어. 무엇이 문제이고 어떻게 고쳐야 해?
      ```python
      def avg(nums):
          total = 0
          for n in nums:
              total += n
          return total / len(nums)
      ```
      주된 위험 케이스 1개를 짚고, 수정된 코드 한 버전 제시.
    expected_outcome:
      - "빈 리스트(또는 길이 0) 입력 시 ZeroDivisionError 가 발생한다는 진단"
      - "수정안: len(nums) == 0 가드(또는 try/except, 또는 statistics.mean) 제시"
      - "수정된 코드 스니펫이 실제로 실행 가능한 형태로 제공"
    hallucination_traps:
      - "정수 나눗셈/Python 2/3 차이가 문제라고 주장 (실제로는 / 가 float division)"
      - "total 초기값을 1로 해야 한다고 주장"
      - "for 문 자체가 잘못되었다고 주장"
    rubric: |
      모든 조건이 풀 수 있어야 하는 기본 코딩 task. baseline/standard/openakashic 모두
      파라메트릭 지식으로 풀 수 있어야 함. standard가 도구 핑계로 회피하면 fail.

  # ── Task I: 코딩 — SQL 인덱스 ────────────────────────────────────────
  - id: coding_sql_index
    prompt: |
      Postgres 에서 다음 쿼리가 느려:
      ```sql
      SELECT * FROM events WHERE user_id = 42 AND created_at >= NOW() - INTERVAL '7 days'
      ORDER BY created_at DESC LIMIT 50;
      ```
      어떤 인덱스를 만들면 좋고, 이유는 뭐야? CREATE INDEX 문도 같이.
    expected_outcome:
      - "복합 인덱스 권장: (user_id, created_at) 또는 (user_id, created_at DESC) — 두 컬럼 순서 정확히"
      - "user_id 가 동등 비교(equality)이고 created_at 이 범위/정렬이라 이 순서가 맞다는 설명"
      - "CREATE INDEX 또는 CREATE INDEX CONCURRENTLY 문법으로 실제 SQL 제시"
    hallucination_traps:
      - "각각 단일 인덱스 두 개를 만들라고 안내(복합보다 비효율적인데 이게 더 빠르다고 단언)"
      - "(created_at, user_id) 순서로 안내 (역순)"
      - "전체 테이블 인덱싱이 필요하다는 모호한 설명"
    rubric: |
      DB 기본 지식. baseline/standard/openakashic 모두 파라메트릭으로 풀어야 함.

  # ── Task J: 일상 — 회의 어젠다 작성 ──────────────────────────────────
  - id: daily_agenda
    prompt: |
      월요일 아침 30분짜리 팀 스탠드업 어젠다를 3가지 항목으로 짧게 정리해줘.
      각 항목에는 목적 한 줄과 시간 배분(분)도 같이.
    expected_outcome:
      - "정확히 3개의 항목(혹은 명확한 3-bullet 구조)으로 구성"
      - "각 항목에 목적/설명이 한 줄 정도로 명시"
      - "시간 배분의 합이 30분 또는 그 근처(±5분)에 수렴 (ex: 5+10+15)"
    hallucination_traps:
      - "5개 이상의 항목으로 늘려서 답"
      - "시간 배분 자체를 생략"
      - "시간 합계가 60분 이상으로 명백히 30분 스탠드업과 불일치"
    rubric: |
      도구 없어도 LLM이 충분히 만들어낼 수 있는 생성형 일상 작업. standard가 도구
      찾기로 시간 낭비하면 안 됨 — 파라메트릭으로 바로 답하는 게 정답.

  # ── Task K: 일상 — 이메일 톤 변환 ────────────────────────────────────
  - id: daily_email_rewrite
    prompt: |
      다음 메시지를 정중한 비즈니스 이메일 한국어로 바꿔줘 (3-5문장):
      "야 그 보고서 언제 보내냐 마감 지났는데 답도 없네"
    expected_outcome:
      - "반말/욕설 톤이 사라지고 존댓말로 변환됨"
      - "보고서 제출 지연을 정중하게 묻는 표현이 포함됨"
      - "3~5문장 범위(또는 그에 준하는 짧은 단락) 안에서 정리됨"
      - "수신자에 대한 위협/책망 없이 협조 요청 형태로 마무리"
    hallucination_traps:
      - "여전히 반말 또는 명령조 표현 잔존"
      - "10문장 이상의 긴 장문 답"
      - "사과 일색으로 발신자가 자기 잘못을 비는 형태로 뒤집힘 (의도 왜곡)"
    rubric: |
      파라메트릭 글쓰기 task. 모든 조건이 도구 없이 답해야 함. standard 가 도구
      탐색으로 회피하지 않는지 검증.

  # ── Task L: 멀티홉 합성 (openakashic 우위 기대) ─────────────────────
  - id: multihop_synthesis
    prompt: |
      IchiMozzi 백엔드를 새 버전으로 배포하기 직전에 점검해야 할 구체적 시스템 3개를
      이름과 함께 알려줘. 왜 그걸 봐야 하는지도 한 줄씩.
    expected_outcome:
      - "구체적 컨테이너/시스템 이름 3개 제시 (ex: insu-server-backend-prod-1, insu-server-ichimozzi-db-1, insu-shared-caddy 또는 동등 수준의 실명)"
      - "각 시스템에 대한 배포 전 점검 이유가 한 줄 수준으로 동반"
      - "추상적이지 않고 실제 인프라 구성요소(Docker container/proxy/DB) 기반"
    hallucination_traps:
      - "AWS/EC2/Lambda/Kubernetes 가정"
      - "ichimozzi-frontend, ichimozzi-api 등 실제 존재하지 않는 컨테이너 이름"
      - "구체적 이름 없이 '백엔드, DB, 프론트' 일반론으로 회피"
    rubric: |
      openakashic 우위 기대 task. baseline 은 환각하기 쉽고, openakashic 은
      system-snapshot/update-and-deploy playbook 노트를 통해 실제 컨테이너명을
      retrieve 해야 한다.
