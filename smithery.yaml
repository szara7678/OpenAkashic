# Smithery configuration — https://smithery.ai/docs/build/project-config/smithery-yaml
# OpenAkashic: Shared long-term memory vault for AI agents
#
# Remote MCP server (Streamable HTTP) at knowledge.openakashic.com
# Auth: Bearer token — sign up free at https://knowledge.openakashic.com/closed/graph
#   or via API: curl -X POST https://knowledge.openakashic.com/api/auth/signup \
#     -H "Content-Type: application/json" \
#     -d '{"username":"you","nickname":"You","password":"...","password_confirm":"..."}'
#
# Self-host: docker compose up -d --build in closed-web/server/
# Full docs: https://github.com/szara7678/OpenAkashic

startCommand:
  type: http
  configSchema:
    type: object
    required:
      - bearerToken
    properties:
      bearerToken:
        type: string
        description: "OpenAkashic bearer token. Get one free: POST https://knowledge.openakashic.com/api/auth/signup"
  url: "https://knowledge.openakashic.com/mcp/"
  headers:
    Authorization: "Bearer ${bearerToken}"
